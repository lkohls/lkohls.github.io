<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Addition Sprint</title>
    <meta
      name="description"
      content="A five-minute addition game for practicing arithmetic with score tracking."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>Addition Sprint</h1>
        <p>Solve as many addition problems as you can in five minutes.</p>
      </header>

      <section class="stats" aria-label="Game status">
        <div class="stat-card">
          <span class="label">Time</span>
          <span id="timer" class="value">05:00</span>
        </div>
        <div class="stat-card">
          <span class="label">Score</span>
          <span id="score" class="value">0</span>
        </div>
      </section>

      <section class="game-card">
        <p id="status" class="status">Press start to begin.</p>
        <div id="question" class="question" aria-live="polite">?</div>

        <form id="answer-form" class="answer-form">
          <label class="sr-only" for="answer">Answer</label>
          <input
            id="answer"
            type="number"
            inputmode="numeric"
            autocomplete="off"
            placeholder="Type your answer"
            disabled
          />
          <button type="submit" id="submit-btn" disabled>Submit</button>
        </form>

        <button id="start-btn" class="start-button">Start</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
